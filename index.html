<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جلی کوردی هاریوان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #d4af37;
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #0b0f19;
            background-image: url('photo.jpg'); 
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: 60px 0 20px 0;
            box-sizing: border-box;
        }

        h1 {
            font-size: 34px;
            margin: 0;
            margin-top: 100px;
            color: var(--primary-gold);
            font-weight: 700; 
            white-space: nowrap;
            -webkit-text-stroke: 1.5px black;
            paint-order: stroke fill;
            text-shadow: 
                2px 2px 0 #000,
               -1px -1px 0 #000,  
                1px -1px 0 #000,
               -1px 1px 0 #000,
                1px 1px 0 #000;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .instagram { background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045); border: none; }
        .tiktok { background: rgba(0, 0, 0, 0.7); }
        .snapchat { background: #FFFC00; color: #000; border: none; font-weight: 600; }
        .whatsapp { background: rgba(37, 211, 102, 0.85); }
        .location { background: rgba(52, 168, 83, 0.85); }

        .btn i { font-size: 20px; width: 35px; text-align: center; }
        .btn span { flex-grow: 1; text-align: center; padding-right: 15px; font-family: 'Segoe UI', Tahoma, sans-serif; }

        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <h1>جلی کوردی هاریوان</h1>

    <div class="card">
        <div class="btn-list">
            
            <a href="https://www.instagram.com/paroket_hariwan?igsh=YjIxNTQ1MXQwNmJy&utm_source=qr" class="btn instagram" target="_blank" rel="noopener">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="https://www.tiktok.com/@hariwan.hussein.barwari?_r=1&_t=ZS-95df0KtB4vS" class="btn tiktok" target="_blank" rel="noopener">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>

            <a href="https://snapchat.com/t/6xkaMfrZ" class="btn snapchat" target="_blank" rel="noopener">
                <i class="fab fa-snapchat"></i>
                <span>Snapchat</span>
            </a>

            <a href="https://maps.app.goo.gl/8EkKnUWEKsJEAQtDA" class="btn location" target="_blank" rel="noopener">
                <i class="fas fa-map-marker-alt"></i>
                <span>Location</span>
            </a>

            <a href="https://wa.me/9647504280337" class="btn whatsapp" target="_blank" rel="noopener">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            
        </div>

        <div class="footer">
            POWERED BY SUNFLOWER WEB
        </div>
    </div>

</body>
</html>
